<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Confirmed | Foundation Lineman</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#fff;--gold:#c8a84b;--gold-light:#e8c96a}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:520px}
.check{width:72px;height:72px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem}
.check svg{width:36px;height:36px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,80px);color:var(--white);line-height:.9;margin-bottom:1rem}
h1 span{color:var(--gold)}
p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:2rem}
a{display:inline-block;background:var(--gold);color:var(--black);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;padding:13px 30px}
a:hover{background:var(--gold-light)}
</style>
</head>
<body>
<div class="wrap">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>ORDER<br /><span>CONFIRMED</span></h1>
  <p>Payment received. Coach James will be in touch within 24 hours to schedule your first session. Check your email for a receipt.</p>
  <a href="./index.html">Back to Home</a>
</div>
</body>
</html>
